{% extends "base.html" %}

{% block extra_styles %}
<style>
    .record-card { cursor:pointer; transition:all 0.2s; }
    .record-card:hover { transform:translateY(-2px); }
    .page-btn {
        padding:8px 14px; border-radius:8px; border:1px solid var(--border);
        background:var(--bg-card); color:var(--text-body); cursor:pointer;
        font-family:inherit; font-size:14px; transition:all 0.2s;
    }
    .page-btn:hover { border-color:var(--accent); }
    .page-btn.active { background:var(--accent); color:white; border-color:var(--accent); }
    .page-btn:disabled { opacity:0.4; cursor:not-allowed; }
</style>
{% endblock %}

{% block content %}
<div class="container" style="padding: 20px;">
    <div class="floating-buttons floating-left">
        <a href="/" class="float-btn" title="返回">←</a>
    </div>

    <header style="text-align:center;margin-bottom:24px;">
        <span class="logo">📜</span>
        <h1 style="font-family:'Noto Serif SC',serif;font-size:28px;font-weight:700;margin-bottom:4px;">历史记录</h1>
        <p class="subtitle">其他玩家的公开人生</p>
    </header>

    <div class="divider"><span>✦</span></div>

    <main>
        <div id="records-container" style="text-align:center;padding:40px 0;color:var(--text-muted);">加载中...</div>
        <div id="pagination" style="display:flex;justify-content:center;gap:8px;margin-top:16px;"></div>
        <div id="detail-view" style="display:none;"></div>
    </main>

    <footer style="text-align:center;margin-top:24px;padding-bottom:20px;">
        <a href="/" style="font-size:13px;color:var(--text-aux);text-decoration:none;">← 返回首页</a>
    </footer>
</div>
{% endblock %}

{% block scripts %}
<script>
let allRecords = [];
let currentPage = 1;
const PER_PAGE = 5;

async function loadRecords() {
    try {
        const resp = await fetch('/api/records');
        allRecords = await resp.json();
        renderPage(1);
    } catch(e) {
        document.getElementById('records-container').innerHTML = '<span style="color:#ef4444;">加载失败</span>';
    }
}

function renderPage(page) {
    currentPage = page;
    const total = Math.ceil(allRecords.length / PER_PAGE) || 1;
    const start = (page - 1) * PER_PAGE;
    const items = allRecords.slice(start, start + PER_PAGE);

    const container = document.getElementById('records-container');

    if (items.length === 0) {
        container.innerHTML = '<div style="padding:40px 0;color:var(--text-muted);font-size:15px;">暂无公开记录</div>';
        document.getElementById('pagination').innerHTML = '';
        return;
    }

    container.innerHTML = items.map(r => {
        const scoreColor = r.score >= 70 ? '#10b981' : r.score >= 40 ? '#f59e0b' : '#ef4444';
        return `<div class="card record-card" style="padding:16px;margin-bottom:10px;" onclick="showDetail('${r.filename}')">
                <div style="display:flex;align-items:center;gap:12px;">
                    <div style="flex:1;">
                        <div style="display:flex;align-items:center;gap:8px;">
                            <span style="font-weight:600;color:var(--text-title);">${r.world}</span>
                            ${r.player_name ? `<span style="font-size:13px;color:var(--text-aux);">— ${r.player_name}</span>` : ''}
                        </div>
                        <div style="font-size:13px;color:var(--text-muted);margin-top:4px;">
                            ${r.lifespan} 岁 · ${r.title || ''} · ${r.saved_at ? r.saved_at.slice(0,10) : ''}
                        </div>
                    </div>
                    ${r.score ? `<span style="font-size:24px;font-weight:700;color:${scoreColor};">${r.score}</span>` : ''}
                </div>
            </div>`;
    }).join('');

    const pg = document.getElementById('pagination');
    let html = `<button class="page-btn" onclick="renderPage(${page-1})" ${page <= 1 ? 'disabled' : ''}>‹</button>`;
    for (let i = 1; i <= total; i++) {
        html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="renderPage(${i})">${i}</button>`;
    }
    html += `<button class="page-btn" onclick="renderPage(${page+1})" ${page >= total ? 'disabled' : ''}>›</button>`;
    pg.innerHTML = html;
    window.scrollTo({top:0,behavior:'smooth'});
}

async function showDetail(filename) {
    const container = document.getElementById('records-container');
    const pagination = document.getElementById('pagination');
    const detail = document.getElementById('detail-view');
    container.style.display = 'none';
    pagination.style.display = 'none';
    detail.style.display = 'block';
    detail.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">加载中...</div>';

    try {
        const resp = await fetch('/api/records/' + encodeURIComponent(filename));
        if (!resp.ok) { detail.innerHTML = '<div style="text-align:center;padding:40px;color:#ef4444;">记录不存在</div>'; return; }
        const r = await resp.json();

        const scoreColor = r.ending && r.ending.score >= 70 ? '#10b981' : r.ending && r.ending.score >= 40 ? '#f59e0b' : '#ef4444';
        detail.innerHTML = `
            <button class="card" style="width:100%;padding:12px 16px;border:none;text-align:left;cursor:pointer;font-family:inherit;background:var(--bg-card);border-radius:12px;margin-bottom:12px;" onclick="backToList()">← 返回列表</button>
            <div class="card" style="padding:24px;">
                <div style="text-align:center;margin-bottom:16px;">
                    <div style="font-size:22px;font-weight:700;color:var(--text-title);">${r.world}</div>
                    ${r.player_name ? `<div style="font-size:15px;color:var(--text-aux);margin-top:4px;">${r.player_name}</div>` : ''}
                    <div style="font-size:13px;color:var(--text-muted);margin-top:4px;">${r.lifespan || 0} 岁</div>
                    ${r.ending && r.ending.score ? `<div style="margin-top:12px;font-size:40px;font-weight:700;color:${scoreColor};">${r.ending.score}</div>` : ''}
                    ${r.ending ? `<div style="font-size:16px;color:var(--text-body);margin-top:8px;">${r.ending.title}</div><div style="font-size:14px;color:var(--text-aux);margin-top:4px;">${r.ending.text}</div>` : ''}
                    ${r.ending && r.ending.summary ? `<div style="font-size:14px;color:var(--text-body);margin-top:12px;padding:12px;background:var(--bg-page);border-radius:8px;">${r.ending.summary}</div>` : ''}
                </div>
                ${r.background ? `<div style="font-size:14px;color:var(--text-aux);margin-bottom:16px;padding:12px;background:var(--bg-page);border-radius:8px;">📖 ${r.background}</div>` : ''}
                ${r.talents && r.talents.length ? `<div style="margin-bottom:16px;font-size:13px;color:var(--text-muted);">天赋：${r.talents.join(' · ')}</div>` : ''}
                <div style="font-size:15px;font-weight:600;color:var(--text-title);margin-bottom:12px;">人生纪事</div>
                ${(r.history || []).map(h => `
                    <div style="padding:8px 0;border-bottom:1px solid var(--border-light);font-size:14px;">
                        <span style="color:var(--text-muted);font-weight:600;">${h.year} 岁</span>
                        <span style="color:var(--text-body);margin-left:8px;">${h.event}</span>
                        ${h.choice ? `<div style="color:var(--text-aux);font-size:13px;margin-top:2px;padding-left:32px;">→ ${h.choice}</div>` : ''}
                    </div>`).join('')}
            </div>`;
    } catch(e) {
        detail.innerHTML = '<div style="text-align:center;padding:40px;color:#ef4444;">加载失败</div>';
    }
}

function backToList() {
    document.getElementById('detail-view').style.display = 'none';
    document.getElementById('records-container').style.display = 'block';
    document.getElementById('pagination').style.display = 'flex';
}

document.addEventListener('DOMContentLoaded', loadRecords);
</script>
{% endblock %}
