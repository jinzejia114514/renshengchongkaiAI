<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI 人生重开手帐{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #f6f3ed;
            --bg-card: #fffaf0;
            --bg-card-hover: #f5ebe0;
            --text-body: #2d2a26;
            --text-title: #1a1816;
            --text-aux: #6b6560;
            --text-muted: #a39d97;
            --border: #e5dfd7;
            --border-light: #f0ebe3;
            --accent: #4a6fa5;
            --accent-light: rgba(74, 111, 165, 0.15);
            --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-card-hover: 0 4px 16px rgba(0, 0, 0, 0.12);
            --radius-card: 12px;
            --radius-btn: 10px;
        }

        [data-theme="dark"] {
            --bg-page: #1c1a17;
            --bg-card: #2a2724;
            --bg-card-hover: #35312d;
            --text-body: #e8e4df;
            --text-title: #f6f3ed;
            --text-aux: #b0aa9f;
            --text-muted: #78736c;
            --border: #3d3832;
            --border-light: #2f2b26;
            --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-card-hover: 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-page);
            color: var(--text-body);
            line-height: 1.6;
            min-height: 100vh;
        }

        .page-texture {
            position: relative;
        }

        .page-texture::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(circle at 1px 1px, var(--border) 1px, transparent 0);
            background-size: 40px 40px;
            opacity: 0.3;
            pointer-events: none;
        }

        .container {
            max-width: 460px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            padding: 32px 24px 16px;
        }

        .logo {
            font-size: 56px;
            margin-bottom: 12px;
            display: block;
        }

        h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--text-title);
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-aux);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 24px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-light);
        }

        .divider span {
            color: var(--text-muted);
            font-size: 12px;
            letter-spacing: 0.1em;
        }

        main {
            flex: 1;
            padding: 0 24px 24px;
        }

        footer {
            padding: 20px 24px 32px;
            text-align: center;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .footer-links a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--text-aux);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 24px;
            min-height: 46px;
            border-radius: var(--radius-btn);
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .btn-primary {
            background: var(--accent);
            color: #fffaf0;
        }

        .btn-primary:hover {
            filter: brightness(1.05);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(74, 111, 165, 0.3);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-title);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-card-hover);
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            transition: all 0.2s;
        }

        .card:hover {
            box-shadow: var(--shadow-card-hover);
        }

        .floating-buttons {
            position: fixed;
            top: 16px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .floating-left {
            left: 16px;
        }

        .floating-right {
            right: 16px;
        }

        .float-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card);
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }

        .float-btn:hover {
            box-shadow: var(--shadow-card-hover);
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        /* 设置弹窗 */
        .settings-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 20px;
            border-radius: 40px;
            background: var(--accent);
            color: white;
            border: none;
            box-shadow: 0 4px 16px rgba(74, 111, 165, 0.4);
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            font-family: inherit;
        }
        .settings-btn:hover {
            box-shadow: 0 6px 24px rgba(74, 111, 165, 0.55);
            transform: translateY(-2px);
        }
        .settings-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .settings-overlay.show { display: flex; }
        .settings-modal {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 28px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .settings-modal h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-title);
        }
        .settings-modal label {
            display: block;
            font-size: 13px;
            color: var(--text-aux);
            margin: 12px 0 4px;
        }
        .settings-modal input, .settings-modal select {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            background: transparent;
            color: var(--text-body);
            box-sizing: border-box;
        }
        .settings-modal input:focus {
            border-color: var(--accent);
            outline: none;
        }
        .settings-modal .hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .settings-modal .warning {
            font-size: 12px;
            color: #ef4444;
            background: rgba(239,68,68,0.1);
            padding: 10px 14px;
            border-radius: 8px;
            margin: 16px 0;
            line-height: 1.6;
        }
        .settings-modal .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .settings-modal .btn-row button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: inherit;
        }
        .settings-modal .btn-save {
            background: var(--accent);
            color: white;
        }
        .settings-modal .btn-close {
            background: var(--bg-page);
            color: var(--text-body);
            border: 1px solid var(--border) !important;
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-dot.on { background: #10b981; }
        .status-dot.off { background: #6b7280; }

    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body>
    <!-- 设置按钮 -->
    <button class="settings-btn" onclick="toggleSettings()" title="LLM 设置">⚙️ LLM 设置</button>

    <!-- 设置弹窗 -->
    <div id="settings-overlay" class="settings-overlay" onclick="closeSettings(event)">
        <div class="settings-modal" onclick="event.stopPropagation()">
            <h2>⚙️ LLM 设置</h2>
            <div class="warning">
                ⚠️ 你的 API Key 仅存在当前浏览器中，不会被保存到服务器。
            </div>

            <label style="display:flex; align-items:center; gap:10px; cursor:pointer; margin-bottom:12px;">
                <input type="checkbox" id="llm-toggle" onchange="toggleOverride()"
                       style="width:18px; height:18px; cursor:pointer;">
                <span style="font-size:15px; font-weight:600;">启用自定义 LLM</span>
                <span id="llm-status" style="font-size:12px; color:var(--text-muted);"></span>
            </label>

            <div id="llm-fields" style="opacity:0.4; pointer-events:none;">
            <label>API 地址</label>
            <input type="url" id="llm-base-url" placeholder="https://api.openai.com/v1"
                   onchange="saveSettings()">
            <div class="hint">OpenAI 格式的 API 地址</div>

            <label>API Key</label>
            <input type="password" id="llm-api-key" placeholder="sk-..."
                   onchange="saveSettings()">
            <div class="hint">不会存储到服务器</div>

            <label>模型名称</label>
            <input type="text" id="llm-model" placeholder="gpt-4o / deepseek-chat"
                   onchange="saveSettings()">

            <div style="display:flex; gap:12px;">
                <div style="flex:1;">
                    <label>Temperature</label>
                    <input type="number" id="llm-temperature" step="0.1" min="0" max="2" placeholder="0.9"
                           onchange="saveSettings()">
                </div>
                <div style="flex:1;">
                    <label>Top P</label>
                    <input type="number" id="llm-top-p" step="0.1" min="0" max="1" placeholder="1.0"
                           onchange="saveSettings()">
                </div>
            </div>

            </div><!-- /llm-fields -->

            <div class="btn-row">
                <button class="btn-close" onclick="toggleSettings()">关闭</button>
                <button class="btn-save" onclick="applyAndClose()">应用</button>
            </div>
        </div>
    </div>

    <div class="page-texture">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script>
    // 纯前端 LLM 设置管理（仅存 sessionStorage，关闭标签即销毁）
    const LLM_KEYS = ['llm-base-url', 'llm-api-key', 'llm-model', 'llm-temperature', 'llm-top-p'];

    function loadSettings() {
        LLM_KEYS.forEach(key => {
            const val = sessionStorage.getItem(key);
            const el = document.getElementById(key);
            if (val && el) el.value = val;
        });
    }

    function saveSettings() {
        LLM_KEYS.forEach(key => {
            const el = document.getElementById(key);
            if (el) sessionStorage.setItem(key, el.value);
        });
    }

    function toggleSettings() {
        const overlay = document.getElementById('settings-overlay');
        overlay.classList.toggle('show');
        loadSettings();
    }

    function closeSettings(e) {
        if (e.target.id === 'settings-overlay') {
            e.target.classList.remove('show');
        }
    }

    function toggleOverride() {
        const on = document.getElementById('llm-toggle').checked;
        const fields = document.getElementById('llm-fields');
        const status = document.getElementById('llm-status');
        fields.style.opacity = on ? '1' : '0.4';
        fields.style.pointerEvents = on ? 'auto' : 'none';
        status.textContent = on ? '已启用' : '(默认 config.json)';
        sessionStorage.setItem('llm-toggle', on ? '1' : '');
    }

    async function applyAndClose() {
        saveSettings();
        const on = document.getElementById('llm-toggle').checked;
        if (on) {
            const body = {};
            const keys = {'llm-base-url': 'api_base', 'llm-api-key': 'api_key', 'llm-model': 'model',
                          'llm-temperature': 'temperature', 'llm-top-p': 'top_p'};
            for (const [storeKey, apiKey] of Object.entries(keys)) {
                const val = sessionStorage.getItem(storeKey);
                if (val) body[apiKey] = val;
            }
            if (Object.keys(body).length > 0) {
                try {
                    await fetch('/api/llm-config', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                } catch(e) { /* ignore */ }
            }
        }
        document.getElementById('settings-overlay').classList.remove('show');
    }

    document.addEventListener('DOMContentLoaded', function() {
        if (sessionStorage.getItem('llm-toggle') === '1') {
            document.getElementById('llm-toggle').checked = true;
            toggleOverride();
        }
    });

    // 自动载入已保存的设置
    document.addEventListener('DOMContentLoaded', loadSettings);
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
